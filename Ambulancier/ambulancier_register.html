<!doctype html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>PIGU – Inscription Ambulancier</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/RegisterAmbulancier.css"
   
</head>

<body>

    <div class="top-bar">
        <div class="top-bar-brand">
            <div class="brand-logo">P</div>
            <div>
                <div class="brand-name">P.I.G.U</div>
                <div class="brand-sub">SAMU National Sénégal</div>
            </div>
        </div>
        <div class="top-bar-right">
            Déjà inscrit ? <a href="ambulancier_login.html">Se connecter</a>
        </div>
    </div>

    <div class="page-content">
        <div class="register-card">
            <div class="card-header-pigu">
                <div class="header-badge">
                    <i class="fa-solid fa-truck-medical"></i>
                    Inscription Ambulancier
                </div>
                <h2 class="header-title">Devenir ambulancier</h2>
                <p class="header-desc">Créez votre compte pour rejoindre la plateforme PIGU.</p>
            </div>

            <div class="card-body-pigu">
                <div id="globalAlert" class="alert-pigu"></div>

                <form id="registerForm">
                    <div class="form-grid">
                        <div class="pigu-field">
                            <label>Nom <span>*</span></label>
                            <div class="field-wrap">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="nom" placeholder="Votre nom" required>
                            </div>
                        </div>
                        <div class="pigu-field">
                            <label>Prénom <span>*</span></label>
                            <div class="field-wrap">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="prenom" placeholder="Votre prénom" required>
                            </div>
                        </div>
                        <div class="pigu-field">
                            <label>Identifiant (login) <span>*</span></label>
                            <div class="field-wrap">
                                <i class="fa-solid fa-at"></i>
                                <input type="text" id="login" placeholder="Votre identifiant" required>
                            </div>
                            <div class="field-hint">Sans espaces, unique</div>
                        </div>
                        <div class="pigu-field">
                            <label>Téléphone <span>*</span></label>
                            <div class="field-wrap">
                                <i class="fa-solid fa-phone"></i>
                                <input type="tel" id="telephone" placeholder="+221 77 000 00 00" required>
                            </div>
                        </div>
                        <div class="pigu-field">
                            <label>Mot de passe <span>*</span></label>
                            <div class="field-wrap">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="password" placeholder="••••••••" required oninput="checkStrength()">
                            </div>
                            <div class="pwd-strength">
                                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                                <div class="strength-text" id="strengthText">Entrez un mot de passe</div>
                            </div>
                        </div>
                        <div class="pigu-field">
                            <label>Confirmer le mot de passe <span>*</span></label>
                            <div class="field-wrap">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="confirmPwd" placeholder="••••••••" required>
                            </div>
                            <div class="field-error" id="pwdError">Les mots de passe ne correspondent pas</div>
                        </div>
                    </div>

                    <button type="submit" class="btn-register" id="submitBtn">
                        <div class="spinner-sm" id="submitSpinner"></div>
                        <i class="fa-solid fa-truck-medical" id="submitIcon"></i>
                        <span id="submitText">Créer mon compte</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

   <script src="../assets/js/RegisterAmbulancier.js"></script>
</body>
</html>
